<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Baloot - صكة الملوك Premium</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #d1c2a5;
            --luxury-gold: #cca43b;
            --gold-gradient: linear-gradient(135deg, #ffe066 0%, #cca43b 50%, #96731c 100%);
            --table-green: radial-gradient(circle, #276736 40%, #154020 80%, #0d2613 100%);
            --card-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        *, *::before, *::after { box-sizing: border-box; }

        /* 👑 البار العلوي */
        .top-score-bar {
            width: 100%; max-width: 410px; background: linear-gradient(180deg, #3a3b3c 0%, #212121 100%);
            padding: 8px 12px; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            z-index: 100; margin-bottom: 2px;
        }
        .score-display-box {
            display: flex; background: #111; border-radius: 10px; border: 1px solid var(--luxury-gold);
            padding: 2px 12px; gap: 15px; font-weight: 900; font-size: 15px; color: #ffe066;
        }

        .lobby-container {
            background: #111622; padding: 30px 20px; border-radius: 24px;
            border: 2px solid var(--luxury-gold); text-align: center; margin-top: 60px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.8); width: 90%; max-width: 360px;
        }

        .luxury-input {
            width: 100%; padding: 12px; margin: 12px 0; border-radius: 12px;
            border: 1px solid var(--luxury-gold); background: #060a13; color: white; text-align: center; font-size: 15px;
        }

        .luxury-button {
            background: var(--gold-gradient); color: #060a13; border: none; padding: 10px 20px;
            font-weight: bold; font-size: 15px; border-radius: 12px; cursor: pointer; width: 100%;
        }

        .double-lock-banner {
            background: linear-gradient(90deg, #bd2130 0%, #dc3545 50%, #bd2130 100%);
            color: white; font-weight: 900; font-size: 11px; padding: 3px 12px;
            border-radius: 20px; box-shadow: 0 0 10px #dc3545; display: none; text-align: center;
        }

        /* 📱 ضبط الطاولة لتناسب الشاشات الطولية للهواتف بجدارة */
        .baloot-table {
            width: 92%; max-width: 390px; height: 340px; background: var(--table-green);
            border: 12px solid #2a1b0c; border-radius: 40px; position: relative; margin: 5px auto;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.5);
        }

        /* مقاعد اللاعبين الشغالة بامتياز على الموبايل */
        .player-seat-avatar {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            width: 80px; z-index: 20; text-align: center;
        }
        .seat-0 { bottom: -15px; left: calc(50% - 40px); }
        .seat-1 { left: -15px; top: calc(50% - 45px); }
        .seat-2 { top: -15px; left: calc(50% - 40px); }
        .seat-3 { right: -15px; top: calc(50% - 45px); }

        .avatar-circle {
            width: 46px; height: 46px; border-radius: 50%; border: 2.5px solid #cca43b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .avatar-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .name-plate {
            background: linear-gradient(180deg, #efe3c3 0%, #cca43b 100%); color: #000;
            font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 8px;
            margin-top: -6px; z-index: 25; width: 70px; text-shadow: 0 0 1px #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2); overflow: hidden; white-space: nowrap;
        }

        .buy-badge-status {
            background: #ffffff; color: #111; font-size: 9px; font-weight: 900;
            padding: 1px 6px; border-radius: 5px; border: 1px solid var(--luxury-gold); display: none; margin-top: 2px;
        }
        
        .project-show-card-box {
            background: rgba(255, 255, 255, 0.95); color: #bd2130; font-size: 9px;
            font-weight: 900; padding: 1px 5px; border-radius: 5px; border: 1px solid #bd2130; display: none; margin-top: 2px;
        }

        /* 🃏 الكروت الملعوبة بالوسط */
        .card {
            width: 58px; height: 84px; background: #ffffff; color: #212121; border-radius: 8px; display: flex;
            flex-direction: column; justify-content: space-between; padding: 4px; font-weight: 900; font-size: 14px;
            box-shadow: var(--card-shadow); border: 1px solid #dcdde1; position: absolute;
        }
        .card.red { color: #d63031; }
        .card.black { color: #2d3436; }
        .card-corner-top { display: flex; justify-content: flex-start; line-height: 0.8; }
        .card-corner-bottom { display: flex; justify-content: flex-end; line-height: 0.8; transform: rotate(180deg); }
        .card-center-icon { text-align: center; font-size: 18px; }

        .card-pos-0 { bottom: 75px; left: calc(50% - 29px); transform: rotate(-3deg); }
        .card-pos-1 { top: calc(50% - 42px); left: 60px; transform: rotate(10deg); }
        .card-pos-2 { top: 75px; left: calc(50% - 29px); transform: rotate(4deg); }
        .card-pos-3 { top: calc(50% - 42px); right: 60px; transform: rotate(-6deg); }

        /* 📊 الحل السحري: رفع وتأمين مروحة اليد لتظهر بوضوح في أسفل الشاشة */
        .player-hand-container {
            display: flex; justify-content: center; width: 100%; max-width: 410px;
            position: relative; height: 110px; margin-top: 10px; margin-bottom: 25px;
        }
        .player-hand-container .card {
            position: absolute; bottom: 15px; transition: all 0.15s ease;
            cursor: pointer; transform-origin: bottom center; border: 1.2px solid #cca43b !important;
        }
        .player-hand-container .card:active, .player-hand-container .card:hover {
            bottom: 35px; z-index: 600 !important; transform: scale(1.15) !important;
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
        }

        /* ☕ منيو الكافتيريا */
        .cafeteria-tray-slide {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 410px; background: #22252a; border-top-left-radius: 20px;
            border-top-right-radius: 20px; border-top: 3px solid var(--luxury-gold); z-index: 999;
            padding: 14px; transition: transform 0.25s ease-out; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        .cafeteria-tray-slide.open { transform: translateX(-50%) translateY(0); }
        .grid-gift-items { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .gift-card-btn { background: #1a1c20; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; }

        .royal-toast {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #111; border: 1.5px solid var(--luxury-gold); padding: 10px 20px; border-radius: 12px;
            color: #ffe066; font-weight: bold; text-align: center; z-index: 9999; opacity: 0; transition: all 0.3s ease; font-size: 13px;
        }
        .royal-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .action-panel-bar {
            background: rgba(15, 22, 38, 0.95); border: 1.5px solid var(--luxury-gold);
            padding: 8px; border-radius: 14px; display: none; justify-content: center; gap: 4px;
            margin: 5px auto; width: 94%; max-width: 390px; z-index: 110;
        }
        .btn-action-round { padding: 8px 10px; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; flex: 1; }
    </style>
</head>
<body>

    <div class="royal-toast" id="global-toast">🚨 تنبيه مجلس الملوك</div>

    <div class="top-score-bar" id="top-nav-bar" style="display:none;">
        <button class="luxury-button" style="padding:4px 10px; font-size:11px; width:auto;" onclick="openCafeteriaTray()">☕ ضيافة</button>
        <div class="score-display-box">
            <div>لنا: <span id="score-t1">0</span></div>
            <div style="color:rgba(255,255,255,0.2);">┃</div>
            <div>لهم: <span id="score-t2">0</span></div>
        </div>
        <div style="font-size:10px; font-weight:bold; color:#a0aec0;" id="session-lbl">جلسة 4893</div>
    </div>

    <div class="lobby-container" id="lobby-screen">
        <h1 style="background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; font-weight: 900; margin:0 0 15px 0;">🃏 صكة الملوك Mobile</h1>
        <input type="text" id="usernameInput" class="luxury-input" placeholder="ادخل اسم اللاعب">
        <button class="luxury-button" onclick="connectToTable()">دخول ولعب فوراً</button>
    </div>

    <div class="game-layout" id="game-layout" style="display:none; flex-direction:column; align-items:center; width:100%;">
        <div class="double-lock-banner" id="lock-banner">📢 دبل مقفل جاري الحين!</div>
        <div id="game-status" style="font-size:11px; color:#111; font-weight:bold; margin-top:2px;">جاري توزيع الكروت...</div>

        <div class="baloot-table" id="main-baloot-table">
            <div id="seat_2" class="player-seat-avatar seat-2">
                <div class="avatar-circle"><img src="https://cdn-icons-png.flaticon.com/512/219/219983.png"></div>
                <div class="name-plate seat-name">نايف</div>
                <div class="buy-badge-status" id="buy_tag_2"></div>
                <div class="project-show-card-box" id="reveal_box_2"></div>
            </div>
            <div id="seat_1" class="player-seat-avatar seat-1">
                <div class="avatar-circle"><img src="https://cdn-icons-png.flaticon.com/512/219/219964.png"></div>
                <div class="name-plate seat-name">الادهم</div>
                <div class="buy-badge-status" id="buy_tag_1"></div>
                <div class="project-show-card-box" id="reveal_box_1"></div>
            </div>
            <div id="seat_3" class="player-seat-avatar seat-3">
                <div class="avatar-circle"><img src="https://cdn-icons-png.flaticon.com/512/219/219968.png"></div>
                <div class="name-plate seat-name">لاعب الخصم</div>
                <div class="buy-badge-status" id="buy_tag_3"></div>
                <div class="project-show-card-box" id="reveal_box_3"></div>
            </div>
            <div id="seat_0" class="player-seat-avatar seat-0">
                <div class="avatar-circle" style="border-color:#4caf50;"><img src="https://cdn-icons-png.flaticon.com/512/219/219970.png"></div>
                <div class="name-plate" id="my-name-span" style="background:linear-gradient(180deg, #fff 0%, #4caf50 100%); color:#fff;">أنت</div>
                <div class="buy-badge-status" id="buy_tag_0"></div>
                <div class="project-show-card-box" id="reveal_box_0"></div>
            </div>
            <div class="center-area" id="center-table"></div>
        </div>

        <div class="action-panel-bar" id="projects-panel" style="background:#1e293b;">
            <button class="btn-action-round" style="background:var(--gold-gradient);" onclick="declareProject('سرا')">سِرا</button>
            <button class="btn-action-round" style="background:var(--gold-gradient);" onclick="declareProject('خمسين')">خمسين</button>
            <button class="btn-action-round" style="background:var(--gold-gradient);" onclick="declareProject('100')">100</button>
            <button class="btn-action-round" style="background:#4a5568; color:white;" onclick="declareProject('لا شيء')">ما عندي شيء</button>
        </div>

        <div class="action-panel-bar" id="buying-panel"></div>
        
        <div class="player-hand-container" id="my-hand"></div>
    </div>

    <div class="cafeteria-tray-slide" id="cafeteria-tray">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:6px;">
            <b style="color:var(--luxury-gold); font-size:14px;">🎁 هدايا وضيافة المجلس</b>
            <button style="background:none; border:none; color:#ff4d4d; font-weight:bold; cursor:pointer;" onclick="closeCafeteriaTray()">❌</button>
        </div>
        <div class="grid-gift-items">
            <div class="gift-card-btn" onclick="confirmGiftDeliveryDirect(1)">☕ شاي لليسار (الادهم)</div>
            <div class="gift-card-btn" onclick="confirmGiftDeliveryDirect(2)">☕ قهوة للمقابل (نايف)</div>
        </div>
    </div>

<script>
    const socket = io(); 
    let mySeatIndex = null;
    let localCards = [];
    let seatMapping = {}; 
    let currentLeadSuit = null;

    function openCafeteriaTray() { document.getElementById('cafeteria-tray').classList.add('open'); }
    function closeCafeteriaTray() { document.getElementById('cafeteria-tray').classList.remove('open'); }
    
    function confirmGiftDeliveryDirect(relSeat) {
        let actualTarget = 0;
        for(let i=0; i<4; i++) { if(seatMapping[i] === relSeat) { actualTarget = i; break; } }
        socket.emit('deliver_hospitality', { fromSeat: mySeatIndex, toSeat: actualTarget, item: "ضيافة فخمة" });
        closeCafeteriaTray();
    }

    function showToast(message) { const toast = document.getElementById('global-toast'); toast.innerText = message; toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 3050); }
    function connectToTable() {
        const username = document.getElementById('usernameInput').value.trim();
        if(!username) return alert("الرجاء إدخال اسم اللاعب!");
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-layout').style.display = 'flex';
        document.getElementById('top-nav-bar').style.display = 'flex';
        socket.emit('join_matchmaking', { username: username });
        setTimeout(() => { socket.emit('start_game_with_bots'); }, 600);
    }

    function declareProject(type) { socket.emit('declare_project_attempt', { seatIndex: mySeatIndex, projectType: type }); document.getElementById('projects-panel').style.display='none'; }

    socket.on('hospitality_broadcast', (data) => { showToast(`🎁 ${data.senderName} أرسل ضيافة لايف إلى ${data.receiverName}!`); });
    socket.on('round_ended_announcement', (data) => { showToast(data.summary); });

    socket.on('room_updated', (data) => {
        for(let i=0; i<4; i++) { if(data.seats[i] && data.seats[i].socketId === socket.id) { mySeatIndex = i; } }
        if(mySeatIndex === null) mySeatIndex = 0;
        seatMapping = {};
        for(let i=0; i<4; i++) {
            let relativePos = (i - mySeatIndex + 4) % 4;
            seatMapping[i] = relativePos;
            const seatDiv = document.getElementById(`seat_${relativePos}`);
            if (data.seats[i]) {
                if (relativePos === 0) { document.getElementById('my-name-span').innerText = data.seats[i].username; }
                else { seatDiv.querySelector('.seat-name').innerText = data.seats[i].username; }
            }
        }
    });

    socket.on('game_state_changed', (data) => {
        document.getElementById('score-t1').innerText = data.scores.team1;
        document.getElementById('score-t2').innerText = data.scores.team2;
        currentLeadSuit = data.leadSuit || null;

        if (data.buyType && data.buyType.includes('مقفل')) { document.getElementById('lock-banner').style.display='block'; }
        else { document.getElementById('lock-banner').style.display='none'; }

        if (data.gameStage === 'playing' && data.trickCount === 0 && data.tableCards.length === 0 && mySeatIndex === data.currentTurn) {
            document.getElementById('projects-panel').style.display = 'flex';
        } else { document.getElementById('projects-panel').style.display = 'none'; }

        for(let i=0; i<4; i++) {
            let relPos = seatMapping[i];
            const buyTag = document.getElementById(`buy_tag_${relPos}`);
            const boxDiv = document.getElementById(`reveal_box_${relPos}`);
            
            if(data.buyerSeat === i && data.buyType) { buyTag.innerText = `${data.buyType}`; buyTag.style.display = 'inline-block'; }
            else { buyTag.style.display = 'none'; }

            if(data.activeProjects && data.activeProjects[i] && data.activeProjects[i] !== "") {
                boxDiv.innerText = `مشروع: ${data.activeProjects[i]}`; boxDiv.style.display = 'block';
            } else { boxDiv.style.display = 'none'; }
        }

        const centerTable = document.getElementById('center-table');
        const buyingPanel = document.getElementById('buying-panel');

        if(data.gameStage === 'buying') {
            document.getElementById('game-status').innerText = `🚨 دور شراء القيد - مقعد ${data.currentTurn}`;
            if(data.flipCard) { centerTable.innerHTML = `<div style="position:absolute; top:calc(50% - 42px); left:calc(50% - 29px); border: 1.5px dashed #cca43b; border-radius:8px;">` + createCardMarkup(data.flipCard) + `</div>`; }
            
            if (data.currentTurn === mySeatIndex) {
                buyingPanel.style.display = 'flex';
                buyingPanel.innerHTML = `
                    <button class="btn-action-round" style="background:#4caf50; color:#fff;" onclick="makeDecision('buy', 'صن')">صن ☀️</button>
                    <button class="btn-action-round" style="background:#2196f3; color:#fff;" onclick="makeDecision('buy', 'حكم')">حكم 👑</button>
                    <button class="btn-action-round" style="background:#e67e22; color:#fff;" onclick="makeDecision('buy', 'أشكل')">أشكل 🃏</button>
                    <button class="btn-action-round" style="background:#f44336; color:#fff;" onclick="makeDecision('buy', 'دبل مقفل')">دبل 🔒</button>
                    <button class="btn-action-round" style="background:#4a5568; color:white;" onclick="makeDecision('pass', null)">بس 🛡</button>
                `;
            } else { buyingPanel.style.display = 'none'; }
        } else {
            document.getElementById('game-status').innerText = `⚔️ الصكة جارية - الأكلة [${data.trickCount + 1}/8]`;
            buyingPanel.style.display = 'none';
            centerTable.innerHTML = "";
            if (data.tableCards && data.tableCards.length > 0) {
                data.tableCards.forEach(item => { centerTable.innerHTML += createCardHTMLWithPosition(item.card, seatMapping[item.seatIndex]); });
            }
        }

        const myCards = data.playersCards[mySeatIndex] || [];
        if(myCards.length > 0) { localCards = myCards; sortMyHand(); renderHand(); }
    });

    function makeDecision(decision, buyType) { socket.emit('player_buy_decision', { seatIndex: mySeatIndex, decision: decision, buyType: buyType }); }

    function throwCardFromHand(cardIndex) {
        const selectedCard = localCards[cardIndex];
        if (currentLeadSuit && selectedCard.suit !== currentLeadSuit) {
            const hasLeadSuitInHand = localCards.some(c => c.suit === currentLeadSuit);
            if (hasLeadSuitInHand) { showToast(`🚨 الأرض ملعوب فيها [${currentLeadSuit}]!`); return; }
        }
        socket.emit('play_card', { seatIndex: mySeatIndex, card: selectedCard });
    }

    function createCardMarkup(card) { const colorClass = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black'; return `<div class="card ${colorClass}"><div class="card-corner-top"><span>${card.value}<br>${card.suit}</span></div><div class="card-center-icon">${card.suit}</div><div class="card-corner-bottom"><span>${card.value}<br>${card.suit}</span></div></div>`; }
    function createCardHTMLWithPosition(card, relPos) { const colorClass = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black'; return `<div class="card ${colorClass} card-pos-${relPos}"><div class="card-corner-top"><span>${card.value}<br>${card.suit}</span></div><div class="card-center-icon">${card.suit}</div><div class="card-corner-bottom"><span>${card.value}<br>${card.suit}</span></div></div>`; }
    
    // 📊 هندسة مروحة اليد الحية والمؤمنة بالملي على شاشة الهاتف
    function renderHand() {
        const handDiv = document.getElementById('my-hand'); handDiv.innerHTML = "";
        const totalCards = localCards.length;
        localCards.forEach((card, index) => {
            const colorClass = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black';
            const mid = (totalCards - 1) / 2;
            const angle = (index - mid) * 8; 
            const xOffset = (index - mid) * 28; // مسافة التداخل الذكي لمنع خروج الكروت من حافة الشاشة
            const yOffset = Math.abs(index - mid) * 2.5;
            
            handDiv.innerHTML += `<div class="card ${colorClass}" style="z-index:${index}; left:calc(50% + ${xOffset}px - 29px); transform: rotate(${angle}deg); bottom:${20 - yOffset}px;" onclick="throwCardFromHand(${index})"><div class="card-corner-top"><span>${card.value}<br>${card.suit}</span></div><div class="card-center-icon">${card.suit}</div><div class="card-corner-bottom"><span>${card.value}<br>${card.suit}</span></div></div>`;
        });
    }

    const suitOrder = { '♠': 1, '♥': 2, '♦': 3, '♣': 4 };
    const cardRankOrder = { 'A': 1, '10': 2, 'K': 3, 'Q': 4, 'J': 5, '9': 6, '8': 7, '7': 8 };
    function sortMyHand() { localCards.sort((a, b) => { if (suitOrder[a.suit] !== suitOrder[b.suit]) return suitOrder[a.suit] - suitOrder[b.suit]; return cardRankOrder[a.value] - cardRankOrder[b.value]; }); }
</script>
</body>
</html>
