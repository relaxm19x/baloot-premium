<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ديوانية البلوت الفاخرة - ADD MORE Q8</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --felt-green: #143d30;
            --luxury-gold: #cca43b;
            --card-white: #ffffff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #060c0a; color: #fff; height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        *, *::before, *::after { box-sizing: border-box; }

        .top-status-bar {
            width: 100%; max-width: 460px; background: #0c1612; padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--luxury-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* 🟢 طاولة البلوت الاحترافية المرنة القياسات 🟢 */
        .baloot-table-felt {
            flex: 1; width: 100%; max-width: 460px; background: radial-gradient(circle, #1c4f3f 0%, #0d2820 100%);
            border: 6px solid #2e1a0f; border-radius: 24px; margin: 8px 0;
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        /* قيد الصكة الملكي التلقائي */
        .score-box-real {
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8);
            border: 1.5px solid var(--luxury-gold); border-radius: 10px; padding: 8px 12px; font-size: 12px;
        }
        .score-row-grid { display: flex; gap: 14px; font-weight: 900; margin-top: 3px; }

        /* مقاعد الموزع واللاعبين */
        .seat-label { position: absolute; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 14px; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .pos-north { top: 12px; left: 50%; transform: translateX(-50%); color: #ff7675; }
        .pos-south { bottom: 120px; left: 50%; transform: translateX(-50%); color: #ffe066; border-color: var(--luxury-gold); }
        .pos-east { right: 12px; top: 35%; transform: translateY(-50%); }
        .pos-west { left: 12px; top: 35%; transform: translateY(-50%); }

        /* كرت المشترى المعروض بالمنتصف للشراء */
        .kitty-center-box {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 10;
        }

        /* ساحة الكروت الملعوبة دغري */
        .floor-arena { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 110px; display: flex; justify-content: center; align-items: center; gap: 6px; }

        /* 🎴 ديزاين الكروت المتوهجة والمجسمة لراحة العين */
        .card-asset {
            width: 48px; height: 70px; background: var(--card-white); color: #000; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: space-between; padding: 4px;
            font-weight: 900; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.15s; border: 1px solid #ddd;
        }
        .card-asset:hover { transform: translateY(-12px); border-color: var(--luxury-gold); }
        .red-suit { color: #d63031; }

        /* منطقة اليد الموزونة بالملي لمنع مقص الشاشة الكريه */
        .hand-cards-dock {
            position: absolute; bottom: 12px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 4px; padding: 0 8px; z-index: 20;
        }

        /* نافذة الشراء والمشترى التفاعلية الرهيبة */
        .buy-panel-bar {
            position: absolute; top: 62%; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 14px; border: 1.5px solid var(--luxury-gold); z-index: 100;
        }
        .buy-action-btn { padding: 8px 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; color: white; }

        /* سجل أحداث الديوانية */
        .baloot-log-box { width: 100%; max-width: 460px; background: #0c1612; padding: 8px 12px; border-radius: 12px; font-size: 12px; color: #ffe066; text-align: right; height: 36px; overflow: hidden; margin-bottom: 5px; border: 1px solid #1c4f3f; }
    </style>
</head>
<body>

    <div class="top-status-bar">
        <div class="logo-title">♠️ ديوانية البلوت المحترفة</div>
        <div style="font-size: 12px; color: #6ab04c; font-weight: bold;" id="active-rule-lbl">المشترى: جاري الفحص..</div>
    </div>

    <!-- 🟢 طاولة البلوت المصقولة والموزونة 🟢 -->
    <div class="baloot-table-felt">
        
        <!-- قيد الصكة الحقيقي (لنا / لهم) التلقائي -->
        <div class="score-box-real">
            <div style="color: var(--luxury-gold); text-align: center; font-size: 11px; font-weight: bold; border-bottom: 1px solid #333;">لوحة القيد</div>
            <div class="score-row-grid">
                <div>لنا: <span id="score-us" style="color:#2ecc71;">0</span></div>
                <div>لهم: <span id="score-them" style="color:#e74c3c;">0</span></div>
            </div>
        </div>

        <!-- المقاعد الأربعة للاعبي الصكة البلوتية -->
        <div class="seat-label pos-north">🤖 مساعد (خويك)</div>
        <div class="seat-label pos-east">🤖 خالد (خصم)</div>
        <div class="seat-label pos-west">🤖 ناصر (خصم)</div>
        <div class="seat-label pos-south">👑 بو محمد (أنت)</div>

        <!-- 🃏 كرت المشترى المكشوف في منتصف الجولة للشراء 🃏 -->
        <div class="kitty-center-box" id="kitty-area">
            <div style="font-size: 10px; color: #aaa;">كرت المشترى:</div>
            <div id="kitty-card-display"></div>
        </div>

        <!-- ساحة رمي الأوراق (الملعوبة لايف الحين) -->
        <div class="floor-arena" id="floor-cards-wrapper"></div>

        <!-- 🛠️ لوحة قرارات الشراء الاحترافية للعبة (اللفة الأولى) -->
        <div class="buy-panel-bar" id="buy-decision-panel">
            <button class="buy-action-btn" style="background: #e67e22;" onclick="submitBuy('صن')">صن 💥</button>
            <button class="buy-action-btn" style="background: #2980b9;" onclick="submitBuy('حكم')">حكم 🛡️</button>
            <button class="buy-action-btn" style="background: #7f8c8d;" onclick="submitBuy('بس')">بس 🔒</button>
        </div>

        <!-- 🎴 كروت يد اللاعب (تتكاثر لـ 8 كروت كاملة فور الشراء) الموزونة بالملي -->
        <div class="hand-cards-dock" id="hand-cards-wrapper"></div>

    </div>

    <!-- سجل أحداث اللعبة السفلي لايف -->
    <div class="baloot-log-box" id="log-box-msg">🎮 أهلاً بك في الصكة الفاخرة.. بانتظار قرار شرائك الحين!</div>

<script>
    const socket = io();

    // الانضمام الفوري للطاولة الفاخرة
    socket.emit('join_baloot_table', { username: "بو محمد" });

    // استقبال وتحديث حالة الطاولة لايف الحين
    socket.on('baloot_state_update', (data) => {
        document.getElementById('score-us').innerText = data.scores.us;
        document.getElementById('score-them').innerText = data.scores.them;
        
        if(data.buyType) {
            document.getElementById('active-rule-lbl').innerText = `اللعب الحالي: [ ${data.buyType} ] بواسطة ${data.buyer}`;
            document.getElementById('kitty-area').style.display = 'none'; // إخفاء المشترى بعد الشراء دغري لتوسيع الساحة
            document.getElementById('buy-decision-panel').style.display = 'none';
        }

        // عرض كرت المشترى في المنتصف قبل الشراء
        if(data.kittyCard && !data.buyType) {
            const isRed = (data.kittyCard.suit === '♥' || data.kittyCard.suit === '♦') ? 'red-suit' : '';
            document.getElementById('kitty-card-display').innerHTML = `
                <div class="card-asset ${isRed}" style="cursor: default;">
                    <div>${data.kittyCard.val}</div>
                    <div style="text-align:center; font-size:20px;">${data.kittyCard.suit}</div>
                </div>
            `;
        }

        // رص كروت يد اللاعب بدقة وتناسق تام
        const handWrapper = document.getElementById('hand-cards-wrapper');
        handWrapper.innerHTML = "";
        data.playerCards.forEach(card => {
            const isRed = (card.suit === '♥' || card.suit === '♦') ? 'red-suit' : '';
            handWrapper.innerHTML += `
                <div class="card-asset ${isRed}" onclick="playCardOnFloor('${card.suit}', '${card.val}')">
                    <div>${card.val}</div>
                    <div style="text-align:center; font-size:20px;">${card.suit}</div>
                </div>
            `;
        });
    });

    // إرسال قرار الشراء للسيرفر
    function submitBuy(decision) {
        socket.emit('baloot_buy_decision', { decision: decision });
    }

    // تفعيل خيارات اللفة الثانية إذا قال الكل بس بطلبك بالملي
    socket.on('baloot_trigger_round2', (data) => {
        const panel = document.getElementById('buy-decision-panel');
        panel.innerHTML = `
            <button class="buy-action-btn" style="background: #e67e22;" onclick="submitBuy('صن جولة 2')">صن لفة 2 💥</button>
            <button class="buy-action-btn" style="background: #27ae60;" onclick="submitBuy('أشكل')">أشكل 🃏</button>
            <button class="buy-action-btn" style="background: #8e44ad;" onclick="submitBuy('تأشيل')">تأشيل 🛡️</button>
        `;
    });

    // رمي الكرت في الملعوبة
    function playCardOnFloor(suit, val) {
        socket.emit('baloot_play_card', { suit, val });
    }

    // عرض اللمة والكروت الملعوبة في ساحة الأرض لايف
    socket.on('baloot_card_played_on_floor', (floorCards) => {
        const floor = document.getElementById('floor-cards-wrapper');
        floor.innerHTML = "";
        floorCards.forEach(item => {
            const isRed = (item.card.suit === '♥' || item.card.suit === '♦') ? 'red-suit' : '';
            floor.innerHTML += `
                <div class="card-asset ${isRed}" style="width:42px; height:62px; font-size:12px; cursor:default;">
                    <div>${item.card.val}</div>
                    <div style="text-align:center; font-size:15px;">${item.card.suit}</div>
                </div>
            `;
        });
    });

    socket.on('baloot_round_cleared', (data) => {
        document.getElementById('log-box-msg').innerText = `🎉 كفووو! اللمة قشها [ ${data.winner} ] وحصد الأبناط لايف!`;
        setTimeout(() => { document.getElementById('floor-cards-wrapper').innerHTML = ""; }, 1500);
    });

    socket.on('baloot_chat_log', (data) => {
        document.getElementById('log-box-msg').innerText = data.msg;
    });
</script>
</body>
</html>
