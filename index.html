<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Baloot - صكة الملوك Premium</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #d8c7a9;
            --luxury-gold: #cca43b;
            --panel-gray: linear-gradient(180deg, #aeaeae 0%, #8e8e8e 100%);
            --btn-border: 2px solid #5a5a5a;
            --table-green: radial-gradient(circle, #2b6f39 40%, #174621 80%, #0c2b14 100%);
            --card-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        *, *::before, *::after { box-sizing: border-box; }

        /* 👑 البار العلوي الفخم لجلسات كملنا */
        .top-score-bar {
            width: 100%; max-width: 420px; background: linear-gradient(180deg, #44464a 0%, #1e1f22 100%);
            padding: 8px 14px; border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 100; border-bottom: 2px solid var(--luxury-gold);
        }
        .score-display-box {
            display: flex; background: #000000; border-radius: 12px; border: 1.5px solid #555;
            padding: 3px 16px; gap: 16px; font-weight: 900; font-size: 16px; color: #ffffff;
        }

        .lobby-container {
            background: #181b22; padding: 35px 25px; border-radius: 24px;
            border: 2px solid var(--luxury-gold); text-align: center; margin-top: 70px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); width: 88%; max-width: 370px;
        }

        .luxury-input {
            width: 100%; padding: 12px; margin: 12px 0; border-radius: 12px;
            border: 1px solid var(--luxury-gold); background: #0c0f16; color: white; text-align: center; font-size: 15px;
        }

        /* 📱 الطاولة الاحترافية المحاكية للواقع */
        .baloot-table {
            width: 94%; max-width: 410px; height: 360px; background: var(--table-green);
            border: 14px solid #33200f; border-radius: 45px; position: relative; margin: 8px auto;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.85), 0 16px 32px rgba(0,0,0,0.6);
        }

        /* 👤 مقاعد وجلسات اللاعبين الفخمة */
        .player-seat-avatar {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            width: 85px; z-index: 20; text-align: center;
        }
        .seat-0 { bottom: -18px; left: calc(50% - 42.5px); }
        .seat-1 { left: -18px; top: calc(50% - 45px); }
        .seat-2 { top: -18px; left: calc(50% - 42.5px); }
        .seat-3 { right: -18px; top: calc(50% - 45px); }

        .avatar-circle {
            width: 52px; height: 52px; border-radius: 50%; border: 3px solid #bba374;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); position: relative;
        }
        .avatar-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .name-plate {
            background: linear-gradient(180deg, #eeddb2 0%, #b39659 100%); color: #000;
            font-size: 10.5px; font-weight: 900; padding: 2px 8px; border-radius: 8px;
            margin-top: -8px; z-index: 25; width: 75px; text-shadow: 0 0 1px #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3); overflow: hidden; white-space: nowrap;
        }

        /* 📢 بالونات نوع الشراء والمشاريع أسفل الأسماء */
        .buy-badge-status {
            background: #ffffff; color: #111; font-size: 9px; font-weight: 900;
            padding: 2px 6px; border-radius: 5px; border: 1px solid #777; display: none; margin-top: 3px;
        }
        
        .project-show-card-box {
            background: #ffffff; color: #d32f2f; font-size: 9px; font-weight: 900;
            padding: 1px 6px; border-radius: 4px; border: 1px solid #d32f2f; display: none; margin-top: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 🃏 الكروت بمنتصف الطاولة */
        .card {
            width: 64px; height: 92px; background: #ffffff; color: #212121; border-radius: 8px; display: flex;
            flex-direction: column; justify-content: space-between; padding: 5px; font-weight: 900; font-size: 16px;
            box-shadow: var(--card-shadow); border: 1.2px solid #b1b2b5; position: absolute;
        }
        .card.red { color: #d63031; }
        .card.black { color: #2d3436; }
        .card-corner-top { display: flex; justify-content: flex-start; line-height: 0.8; }
        .card-corner-bottom { display: flex; justify-content: flex-end; line-height: 0.8; transform: rotate(180deg); }
        .card-center-icon { text-align: center; font-size: 20px; }

        .card-pos-0 { bottom: 80px; left: calc(50% - 32px); transform: rotate(-2deg); }
        .card-pos-1 { top: calc(50% - 46px); left: 65px; transform: rotate(8deg); }
        .card-pos-2 { top: 80px; left: calc(50% - 32px); transform: rotate(4deg); }
        .card-pos-3 { top: calc(50% - 46px); right: 65px; transform: rotate(-6deg); }

        /* 📊 لوحة عدادات المشاريع الاحترافية التلقائية أسفل الشاشة */
        .project-counters-row {
            display: flex; gap: 6px; justify-content: center; width: 96%; max-width: 410px; margin-top: 6px;
        }
        .counter-badge-item {
            flex: 1; background: linear-gradient(180deg, #ededed 0%, #bfbfbf 100%); border: var(--btn-border);
            border-radius: 10px; color: #333; font-weight: 900; font-size: 12px; padding: 6px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .counter-number-circle {
            background: #fff; color: #000; border-radius: 50%; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1px solid #555;
        }

        /* 🎛 لوحة أزرار الشراء الفخمة (مطابقة تماماً لـ image_8.png) */
        .action-panel-bar {
            background: none; padding: 0; display: none; justify-content: center; gap: 6px;
            margin: 12px auto 4px auto; width: 96%; max-width: 410px; z-index: 110;
        }
        .btn-action-kamalna {
            flex: 1; background: var(--panel-gray); border: var(--btn-border);
            color: #111111; font-weight: 900; font-size: 14px; padding: 12px 10px;
            border-radius: 12px; cursor: pointer; text-shadow: 0 1px 0 rgba(255,255,255,0.4);
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.5), 0 5px 10px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }
        .btn-action-kamalna:active {
            transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 📊 مروحة اليد المقوسة الشرحة السلسة */
        .player-hand-container {
            display: flex; justify-content: center; width: 100%; max-width: 410px;
            position: relative; height: 105px; margin-top: 6px; margin-bottom: 20px;
        }
        .player-hand-container .card {
            position: absolute; bottom: 12px; transition: all 0.15s ease;
            cursor: pointer; transform-origin: bottom center; border: 1.2px solid #555 !important;
        }
        .player-hand-container .card:active, .player-hand-container .card:hover {
            bottom: 30px; z-index: 600 !important; transform: scale(1.12) !important;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        .royal-toast {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #222; border: 1.5px solid var(--luxury-gold); padding: 10px 20px; border-radius: 12px;
            color: #ffe066; font-weight: bold; text-align: center; z-index: 9999; opacity: 0; transition: all 0.3s ease;
        }
        .royal-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="royal-toast" id="global-toast">🚨 تنبيه ديوانية كملنا</div>

    <!-- البار العلوي المحاكي لـ كملنا بالملي -->
    <div class="top-score-bar" id="top-nav-bar" style="display:none;">
        <div style="font-size:12px; font-weight:bold; color:#a0aec0;">💬 تعابير</div>
        <div class="score-display-box">
            <div>لنا: <span id="score-t1">0</span></div>
            <div style="color:#444;">┃</div>
            <div>لهم: <span id="score-t2">0</span></div>
        </div>
        <div style="font-size:11px; font-weight:bold; color:#a0aec0;" id="session-lbl">جلسة 1253</div>
    </div>

    <div class="lobby-container" id="lobby-screen">
        <h1 style="background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; font-weight: 900; margin:0 0 15px 0;">🃏 صكة الملوك الاحترافية</h1>
        <input type="text" id="usernameInput" class="luxury-input" placeholder="ادخل اسم اللاعب">
        <button class="btn-action-kamalna" style="width:100%; padding:12px;" onclick="connectToTable()">دخول مجلس الصكة</button>
    </div>

    <div class="game-layout" id="game-layout" style="display:none; flex-direction:column; align-items:center; width:100%;">
        <div id="game-status" style="font-size:11px; color:#111; font-weight:bold; margin-top:2px;">جاري التوزيع...</div>

        <div class="baloot-table" id="main-baloot-table">
            <div id="seat_2" class="player-seat-avatar seat-2">
                <div class="avatar-circle"><img src="https://cdn-icons-png.flaticon.com/512/219/219983.png"></div>
                <div class="name-plate seat-name">Thamer</div>
                <div class="buy-badge-status" id="buy_tag_2"></div>
                <div class="project-show-card-box" id="reveal_box_2"></div>
            </div>
            <div id="seat_1" class="player-seat-avatar seat-1">
                <div class="avatar-circle"><img src="https://cdn-icons-png.flaticon.com/512/219/219964.png"></div>
                <div class="name-plate seat-name">Abomidal</div>
                <div class="buy-badge-status" id="buy_tag_1"></div>
                <div class="project-show-card-box" id="reveal_box_1"></div>
            </div>
            <div id="seat_3" class="player-seat-avatar seat-3">
                <div class="avatar-circle"><img src="https://cdn-icons-png.flaticon.com/512/219/219968.png"></div>
                <div class="name-plate seat-name">Seemo</div>
                <div class="buy-badge-status" id="buy_tag_3"></div>
                <div class="project-show-card-box" id="reveal_box_3"></div>
            </div>
            <div id="seat_0" class="player-seat-avatar seat-0">
                <div class="avatar-circle" style="border-color:#4caf50;"><img src="https://cdn-icons-png.flaticon.com/512/219/219970.png"></div>
                <div class="name-plate" id="my-name-span" style="background:linear-gradient(180deg, #fff 0%, #b39659 100%); color:#000;">Mohammad RTL</div>
                <div class="buy-badge-status" id="buy_tag_0"></div>
                <div class="project-show-card-box" id="reveal_box_0"></div>
            </div>
            <div class="center-area" id="center-table"></div>
        </div>

        <!-- 🎛 لوحة خيارات الشراء الكبسولية الرمادية الفخمة المطابقة لـ كملنا بالملي -->
        <div class="action-panel-bar" id="buying-panel"></div>

        <!-- 📊 لوحة العدادات التلقائية للمشاريع أسفل الطاولة -->
        <div class="project-counters-row">
            <div class="counter-badge-item" onclick="declareProject('سرا')"><span>سرا</span><div class="counter-number-circle">١</div></div>
            <div class="counter-badge-item" onclick="declareProject('خمسين')"><span>٥٠</span><div class="counter-number-circle">٠</div></div>
            <div class="counter-badge-item" onclick="declareProject('100')"><span>١٠٠</span><div class="counter-number-circle">٠</div></div>
            <div class="counter-badge-item" onclick="declareProject('400')"><span>٤٠٠</span><div class="counter-number-circle">٠</div></div>
        </div>
        
        <!-- 📊 مروحة اليد المقوسة الشرحة والمحميّة -->
        <div class="player-hand-container" id="my-hand"></div>
    </div>

<script>
    const socket = io(); 
    let mySeatIndex = null;
    let localCards = [];
    let seatMapping = {}; 
    let currentLeadSuit = null;

    function showToast(message) { const toast = document.getElementById('global-toast'); toast.innerText = message; toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 3000); }
    function connectToTable() {
        const username = document.getElementById('usernameInput').value.trim();
        if(!username) return alert("الرجاء إدخال اسم اللاعب!");
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('game-layout').style.display = 'flex';
        document.getElementById('top-nav-bar').style.display = 'flex';
        socket.emit('join_matchmaking', { username: username });
        setTimeout(() => { socket.emit('start_game_with_bots'); }, 500);
    }

    function declareProject(type) { socket.emit('declare_project_attempt', { seatIndex: mySeatIndex, projectType: type }); showToast(`📢 أعلنت مشروعك: ${type}`); }

    socket.on('round_ended_announcement', (data) => { showToast(data.summary); });

    socket.on('room_updated', (data) => {
        for(let i=0; i<4; i++) { if(data.seats[i] && data.seats[i].socketId === socket.id) { mySeatIndex = i; } }
        if(mySeatIndex === null) mySeatIndex = 0;
        seatMapping = {};
        for(let i=0; i<4; i++) {
            let relativePos = (i - mySeatIndex + 4) % 4;
            seatMapping[i] = relativePos;
            const seatDiv = document.getElementById(`seat_${relativePos}`);
            if (data.seats[i]) {
                if (relativePos === 0) { document.getElementById('my-name-span').innerText = data.seats[i].username; }
                else { seatDiv.querySelector('.seat-name').innerText = data.seats[i].username; }
            }
        }
    });

    socket.on('game_state_changed', (data) => {
        document.getElementById('score-t1').innerText = data.scores.team1;
        document.getElementById('score-t2').innerText = data.scores.team2;
        currentLeadSuit = data.leadSuit || null;

        for(let i=0; i<4; i++) {
            let relPos = seatMapping[i];
            const buyTag = document.getElementById(`buy_tag_${relPos}`);
            const boxDiv = document.getElementById(`reveal_box_${relPos}`);
            
            if(data.buyerSeat === i && data.buyType) { buyTag.innerText = `${data.buyType}`; buyTag.style.display = 'inline-block'; }
            else { buyTag.style.display = 'none'; }

            if(data.activeProjects && data.activeProjects[i] && data.activeProjects[i] !== "") {
                boxDiv.innerText = `${data.activeProjects[i]}`; boxDiv.style.display = 'block';
            } else { boxDiv.style.display = 'none'; }
        }

        const centerTable = document.getElementById('center-table');
        const buyingPanel = document.getElementById('buying-panel');

        if(data.gameStage === 'buying') {
            document.getElementById('game-status').innerText = `دور شراء القيد - مقعد ${data.currentTurn}`;
            if(data.flipCard) { centerTable.innerHTML = `<div style="position:absolute; top:calc(50% - 46px); left:calc(50% - 32px); border: 1.5px dashed #cca43b; border-radius:8px;">` + createCardMarkup(data.flipCard) + `</div>`; }
            
            if (data.currentTurn === mySeatIndex) {
                buyingPanel.style.display = 'flex';
                buyingPanel.innerHTML = `
                    <button class="btn-action-kamalna" onclick="makeDecision('buy', 'صن')">صن</button>
                    <button class="btn-action-kamalna" onclick="makeDecision('buy', 'حكم')">حكم</button>
                    <button class="btn-action-kamalna" onclick="makeDecision('buy', 'أشكل')">أشكل</button>
                    <button class="btn-action-kamalna" onclick="makeDecision('pass', null)">بس</button>
                `;
            } else { buyingPanel.style.display = 'none'; }
        } else {
            document.getElementById('game-status').innerText = `الأكلة الجارية [${data.trickCount + 1}/8]`;
            buyingPanel.style.display = 'none';
            centerTable.innerHTML = "";
            if (data.tableCards && data.tableCards.length > 0) {
                data.tableCards.forEach(item => { centerTable.innerHTML += createCardHTMLWithPosition(item.card, seatMapping[item.seatIndex]); });
            }
        }

        const myCards = data.playersCards[mySeatIndex] || [];
        if(myCards.length > 0) { localCards = myCards; sortMyHand(); renderHand(); }
    });

    function makeDecision(decision, buyType) { socket.emit('player_buy_decision', { seatIndex: mySeatIndex, decision: decision, buyType: buyType }); }

    function throwCardFromHand(cardIndex) {
        const selectedCard = localCards[cardIndex];
        if (currentLeadSuit && selectedCard.suit !== currentLeadSuit) {
            const hasLeadSuitInHand = localCards.some(c => c.suit === currentLeadSuit);
            if (hasLeadSuitInHand) { showToast(`🚨 الأرض ملعوب فيها [${currentLeadSuit}]!`); return; }
        }
        socket.emit('play_card', { seatIndex: mySeatIndex, card: selectedCard });
    }

    function createCardMarkup(card) { const colorClass = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black'; return `<div class="card ${colorClass}"><div class="card-corner-top"><span>${card.value}<br>${card.suit}</span></div><div class="card-center-icon">${card.suit}</div><div class="card-corner-bottom"><span>${card.value}<br>${card.suit}</span></div></div>`; }
    function createCardHTMLWithPosition(card, relPos) { const colorClass = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black'; return `<div class="card ${colorClass} card-pos-${relPos}"><div class="card-corner-top"><span>${card.value}<br>${card.suit}</span></div><div class="card-center-icon">${card.suit}</div><div class="card-corner-bottom"><span>${card.value}<br>${card.suit}</span></div></div>`; }
    
    function renderHand() {
        const handDiv = document.getElementById('my-hand'); handDiv.innerHTML = "";
        const totalCards = localCards.length;
        localCards.forEach((card, index) => {
            const colorClass = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black';
            const mid = (totalCards - 1) / 2;
            const angle = (index - mid) * 7.5; 
            const xOffset = (index - mid) * 27; 
            const yOffset = Math.abs(index - mid) * 2.5;
            
            handDiv.innerHTML += `<div class="card ${colorClass}" style="z-index:${index}; left:calc(50% + ${xOffset}px - 32px); transform: rotate(${angle}deg); bottom:${15 - yOffset}px;" onclick="throwCardFromHand(${index})"><div class="card-corner-top"><span>${card.value}<br>${card.suit}</span></div><div class="card-center-icon">${card.suit}</div><div class="card-corner-bottom"><span>${card.value}<br>${card.suit}</span></div></div>`;
        });
    }

    const suitOrder = { '♠': 1, '♥': 2, '♦': 3, '♣': 4 };
    const cardRankOrder = { 'A': 1, '10': 2, 'K': 3, 'Q': 4, 'J': 5, '9': 6, '8': 7, '7': 8 };
    function sortMyHand() { localCards.sort((a, b) => { if (suitOrder[a.suit] !== suitOrder[b.suit]) return suitOrder[a.suit] - suitOrder[b.suit]; return cardRankOrder[a.value] - cardRankOrder[b.value]; }); }
</script>
</body>
</html>
