<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ديوانية البلوت الرسمية - ADD MORE Q8</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --felt-green: #1b4d3e; /* لون الطاولة الأخضر التراثي المريح للعين */
            --luxury-gold: #cca43b;
            --wood-border: #3d2314;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #0b1310; color: #fff;
            height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        *, *::before, *::after { box-sizing: border-box; }

        .top-nav-bar {
            width: 100%; max-width: 500px; background: #111815; padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--luxury-gold); z-index: 10;
        }
        .logo-title { font-size: 16px; font-weight: 900; color: var(--luxury-gold); }

        /* 🟢 تصميم طاولة البلوت الخضراء الدائرية المريحة 🟢 */
        .baloot-table-area {
            flex: 1; width: 100%; max-width: 500px; background: radial-gradient(circle, #225c4a 0%, #153b2f 100%);
            border: 8px solid var(--wood-border); border-radius: 24px; margin: 10px 0;
            position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 8px 20px rgba(0,0,0,0.4);
        }

        /* مواقع اللاعبين الأربعة على الطاولة */
        .player-seat { position: absolute; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid rgba(255,255,255,0.15); }
        .seat-north { top: 10px; left: 50%; transform: translateX(-50%); color: #ff7675; }
        .seat-south { bottom: 105px; left: 50%; transform: translateX(-50%); color: #ffe066; border-color: var(--luxury-gold); }
        .seat-east { right: 10px; top: 40%; transform: translateY(-50%); }
        .seat-west { left: 10px; top: 40%; transform: translateY(-50%); }

        /* لوحة القيد الحقيقية (لنا / لهم) */
        .score-board-baloot {
            position: absolute; top: 50px; right: 15px; background: rgba(0, 0, 0, 0.75);
            border: 1px solid var(--luxury-gold); border-radius: 8px; padding: 6px 10px; font-size: 11px; text-align: center;
        }
        .score-table { display: flex; gap: 10px; font-weight: bold; }
        .score-title-grid { color: var(--luxury-gold); border-bottom: 1px solid #444; padding-bottom: 2px; margin-bottom: 2px; }

        /* ساحة اللعب ورمي الكروت في المنتصف */
        .floor-cards-center {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; height: 100px; display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* 🎴 تصميم كروت اللعب الفاخرة والانسيابية */
        .baloot-card-item {
            width: 52px; height: 76px; background: #fff; color: #000; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: space-between; padding: 5px;
            font-weight: 900; font-size: 15px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.15s, box-shadow 0.15s; position: relative;
        }
        .baloot-card-item:hover { transform: translateY(-10px); box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .card-red { color: #d63031; }

        /* منطقة كروت اللاعب في الأسفل الموزونة بالملي */
        .my-hand-cards-container {
            width: 100%; display: flex; justify-content: center; gap: 5px;
            position: absolute; bottom: 12px; left: 0; padding: 0 10px; z-index: 5;
        }

        /* أزرار خيارات الشراء (صن / حكم) */
        .bidding-options-bar {
            position: absolute; top: 60%; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 12px; border: 1px solid var(--luxury-gold);
        }
        .bid-btn { padding: 6px 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-son { background: #e67e22; color: #fff; }
        .btn-hkm { background: #2980b9; color: #fff; }
        .btn-pass { background: #7f8c8d; color: #fff; }
    </style>
</head>
<body>

    <!-- البار العلوي للمنصة الرسمية -->
    <div class="top-nav-bar">
        <div class="logo-title">♠️ ديوانية البلوت الرسمية</div>
        <div style="font-size:12px; color:#aaa;" id="game-status-text">نوع اللعب: صن 🃏</div>
    </div>

    <!-- 🟢 طاولة البلوت الاحترافية المصلحة القياسات 🟢 -->
    <div class="baloot-table-area">
        
        <!-- لوحة النشر والقيد (لنا ولهم) الثابتة تلقائياً بطلبك -->
        <div class="score-board-baloot">
            <div class="score-title-grid">قيد الصكة</div>
            <div class="score-table">
                <div>لنا: <span id="score-us" style="color:#2ecc71;">0</span></div>
                <div>لهم: <span id="score-them" style="color:#e74c3c;">0</span></div>
            </div>
        </div>

        <!-- المقاعد الأربعة للربع والبوتات -->
        <div class="player-seat seat-north" id="p-north">🤖 مساعد (شمال)</div>
        <div class="player-seat seat-west" id="p-west">🤖 nasser (غرب)</div>
        <div class="player-seat seat-east" id="p-east">🤖 khaled (شرق)</div>
        <div class="player-seat seat-south" id="p-south">👑 بو محمد (جنوب)</div>

        <!-- وسط الطاولة (الملعوبة لايف) -->
        <div class="floor-cards-center" id="table-floor-cards">
            <div style="color:rgba(255,255,255,0.2); font-size:11px; text-align:center;">ارمِ الكرت في الساحة الحين</div>
        </div>

        <!-- لوحة خيارات الشراء والمشترى (صن / حكم) للمحترفين -->
        <div class="bidding-options-bar" id="bid-panel">
            <button class="bid-btn btn-son" onclick="selectGameType('صن')">صن 💥</button>
            <button class="bid-btn btn-hkm" onclick="selectGameType('حكم')">حكم 🛡️</button>
            <button class="bid-btn btn-pass" onclick="selectGameType('بس')">ولاء (بس)</button>
        </div>

        <!-- 🎴 كروت اللاعب (يدك) في أسفل شاشة الآيباد والهاتف بشكل كامل ومرئي -->
        <div class="my-hand-cards-container" id="my-cards-wrapper"></div>

    </div>

<script>
    const socket = io();

    // الاتصال الفوري وحجز المقعد في الطاولة
    socket.emit('join_baloot_table', { username: "بو محمد" });

    // استقبال الأوراق وحالة اللعبة من السيرفر وعرضها فوراً
    socket.on('baloot_state_update', (data) => {
        document.getElementById('score-us').innerText = data.scores.us;
        document.getElementById('score-them').innerText = data.scores.them;
        document.getElementById('game-status-text').innerText = `نوع اللعب: ${data.gameType} 🃏`;

        // رص الكروت في يد اللاعب بقمة الأناقة
        const wrapper = document.getElementById('my-cards-wrapper');
        wrapper.innerHTML = "";
        
        data.playerCards.forEach(card => {
            const isRed = (card.suit === '♥' || card.suit === '♦') ? 'card-red' : '';
            const cardHtml = `
                <div class="baloot-card-item ${isRed}" onclick="playCard('${card.suit}', '${card.val}')">
                    <div>${card.val}</div>
                    <div style="text-align:center; font-size:22px;">${card.suit}</div>
                    <div style="text-align:left; transform: rotate(180deg);">${card.val}</div>
                </div>
            `;
            wrapper.innerHTML += cardHtml;
        });
    });

    // رمي الكرت في الساحة لايف
    function playCard(suit, val) {
        socket.emit('baloot_play_card', { suit, val });
    }

    // عرض الكروت الملعوبة في ساحة منتصف الطاولة فوراً
    socket.on('baloot_card_played_on_floor', (floorCards) => {
        const floor = document.getElementById('table-floor-cards');
        floor.innerHTML = "";
        floorCards.forEach(item => {
            const isRed = (item.card.suit === '♥' || item.card.suit === '♦') ? 'card-red' : '';
            floor.innerHTML += `
                <div class="baloot-card-item ${isRed}" style="cursor:default; width:46px; height:66px; font-size:12px;">
                    <div>${item.card.val}</div>
                    <div style="text-align:center; font-size:16px;">${item.card.suit}</div>
                </div>
            `;
        });
    });

    function selectGameType(type) {
        if(type === 'بس') {
            alert("🔒 مررت السرا.. بانتظار خيار المشتري من باقي اللاعبين على الطاولة.");
        } else {
            alert(`🃏 كفوو! اخترت اللعب الحين: [ ${type} ] - ارمِ ورقتك الأولى واقشّ الأرض!`);
            document.getElementById('game-status-text').innerText = `نوع اللعب: ${type} 🃏`;
        }
        document.getElementById('bid-panel').style.display = 'none';
    }
</script>
</body>
</html>
